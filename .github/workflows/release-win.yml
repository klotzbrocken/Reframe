name: Release (Windows)

# Builds the Windows installer + portable build and publishes them to the
# GitHub Release for the pushed tag (e.g. v1.1.0). electron-updater reads the
# generated latest.yml, so installed Windows copies auto-update from here.
#
# The macOS build stays a local `npm run release` (it needs the Developer ID
# keychain + notarytool profile). Both platforms publish to the same release.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & publish Windows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release:win
